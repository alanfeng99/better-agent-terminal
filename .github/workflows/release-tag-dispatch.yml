name: Release Tag Dispatch

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release workflow on main
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh workflow run release.yml \
            --ref main \
            --field release_tag="$RELEASE_TAG" \
            --field run_verification=false
